[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# API calls → serverless function (must come before the SPA catch-all)
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
